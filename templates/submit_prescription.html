<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Prescription</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 {
            color: #2c3e50;
            text-align: center;
        }
        nav {
            text-align: center;
            margin-bottom: 20px;
        }
        nav a {
            margin: 0 10px;
            text-decoration: none;
            color: #007bff;
            font-weight: bold;
        }
        nav a:hover {
            text-decoration: underline;
        }
        .card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            padding: 20px;
        }
        form {
            display: flex;
            flex-direction: column;
        }
        label {
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, select {
            margin-bottom: 15px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            padding: 10px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #218838;
        }
        .success {
            color: green;
            text-align: center;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <h1>Submit Prescription</h1>
    <nav>
        <a href="/">Dashboard</a>
        <a href="/register_patient">Register Patient</a>
        <a href="/submit_prescription">Submit Prescription</a>
    </nav>
    <div class="card">
        {% if message %}
        <div class="success">{{ message }}</div>
        {% endif %}
        <form action="/submit_prescription" method="POST">
            <label for="patient_id">Patient</label>
            <select id="patient_id" name="patient_id" required>
                {% for patient in patients %}
                <option value="{{ patient.patient_id }}">{{ patient.patient_name }} (Age: {{ patient.patient_age }})</option>
                {% endfor %}
            </select>
            
            <label for="hospital_id">Hospital</label>
            <select id="hospital_id" name="hospital_id" required>
                {% for hospital in hospitals %}
                <option value="{{ hospital.hospital_id }}">{{ hospital.hospital_name }}</option>
                {% endfor %}
            </select>
            
            <label for="prescription_count">Prescription Count (Days)</label>
            <input type="number" id="prescription_count" name="prescription_count" required>
            
            <label for="init_drugid">Initial Drug</label>
            <select id="init_drugid" name="init_drugid" required>
                <option value="">-- Select Common Antibiotic --</option>
                {% for drug in common_drugs %}
                <option value="{{ drug.antibiotic_id }}">{{ drug.antibiotic_name }}</option>
                {% endfor %}
            </select>
            
            <label for="condition_diagnosed">Did they diagnose your condition?</label>
            <select id="condition_diagnosed" name="condition_diagnosed" required>
                <option value="1">Yes</option>
                <option value="0">No</option>
            </select>
            
            <label for="condition_pathogen">Condition & Pathogen (If diagnosed)</label>
            <select id="condition_pathogen" name="condition_pathogen">
                <option value="">Unknown / None</option>
                <option value="Urinary Tract Infection (E. coli)">Urinary Tract Infection (E. coli)</option>
                <option value="Pneumonia (S. pneumoniae, K. pneumoniae)">Pneumonia (S. pneumoniae, K. pneumoniae)</option>
                <option value="Skin Infection (S. aureus, MRSA)">Skin Infection (S. aureus, MRSA)</option>
                <option value="Throat Infection (Streptococcus pyogenes)">Throat Infection (Streptococcus pyogenes)</option>
                <option value="Tuberculosis (M. tuberculosis)">Tuberculosis (M. tuberculosis)</option>
                <option value="Sepsis (Various)">Sepsis (Various)</option>
                <option value="Other">Other</option>
            </select>
            
            <label for="final_drugid">Final Drug (After Diagnosis)</label>
            <select id="final_drugid" name="final_drugid">
                <option value="">None / Same as Initial</option>
                <optgroup label="Common Antibiotics">
                    {% for drug in common_drugs %}
                    <option value="{{ drug.antibiotic_id }}">{{ drug.antibiotic_name }}</option>
                    {% endfor %}
                </optgroup>
                <optgroup label="Specialized Antibiotics">
                    {% for drug in specialized_drugs %}
                    <option value="{{ drug.antibiotic_id }}">{{ drug.antibiotic_name }}</option>
                    {% endfor %}
                </optgroup>
            </select>
            
            <button type="submit">Submit Prescription</button>
        </form>
    </div>
</body>
</html>
